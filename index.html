<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://www.gstatic.com/firebasejs/7.18.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.18.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.18.0/firebase-database.js"></script>
  </head>
  <body>
    <div id="authSection" class="auth-wrapper">
      <div class="auth-box">
        <div class="tabs">
          <button class="tab-btn active" onclick="showTab('loginTab', this)">
            Login
          </button>
          <button class="tab-btn" onclick="showTab('signupTab', this)">
            Sign Up
          </button>
        </div>

        <div id="loginTab" class="tab-content active">
          <h2>Welcome Back</h2>
          <input
            type="text"
            id="loginIdentifier"
            placeholder="Username or Email"
          />
          <input type="password" id="loginPassword" placeholder="Password" />
          <button onclick="login()">Login</button>
          <button class="forgot-btn" onclick="forgotPassword()">
            Forgot Password?
          </button>
        </div>

        <div id="signupTab" class="tab-content">
          <h2>Create Account</h2>
          <input type="text" id="username" placeholder="Username" />
          <input type="text" id="name" placeholder="Display Name" />
          <input
            type="text"
            id="photoURL"
            placeholder="Profile Image URL optional"
          />
          <input type="email" id="email" placeholder="Email" />
          <input type="password" id="password" placeholder="Password" />
          <button onclick="signUp()">Sign Up</button>
        </div>
      </div>
    </div>

    <div id="chatSection" style="display: none">
      <div id="leftPanel">
        <div class="sidebar-header">
          <div class="profile-info">
            <img
              id="myPhoto"
              class="profile-pic"
              src="https://via.placeholder.com/40"
            />
            <span id="myName">My Profile</span>
          </div>

          <button class="dots-btn" onclick="openAccountPanel()">⋮</button>
        </div>

        <div class="search-box">
          <input id="searchInput" placeholder="Search by username" />
          <button onclick="searchUser()">Search</button>
        </div>

        <div id="searchResult"></div>

        <div class="section-title">Requests</div>
        <div id="requestList"></div>

        <div class="section-title">Contacts</div>
        <div id="userList"></div>
      </div>

      <div id="rightPanel">
        <div id="emptyState" class="empty-state">
          <h2>Select a contact to start chatting</h2>
        </div>

        <div id="accountPanel" style="display: none">
          <div id="accountHeader">
            <button class="back-btn" onclick="closeAccountPanel()">←</button>
            <span>Account Details</span>
          </div>

          <div class="account-content">
            <img
              id="accountPhoto"
              class="account-big-photo"
              src="https://via.placeholder.com/120"
            />
            <h2 id="accountName">User Name</h2>
            <input
              type="text"
              id="newPhotoURL"
              placeholder="New profile image URL"
            />

            <button class="account-password-btn" onclick="updateProfilePhoto()">
              Update DP
            </button>

            <div class="account-card">
              <p>Username</p>
              <span id="accountUsername"></span>
            </div>

            <div class="account-card">
              <p>Email</p>
              <span id="accountEmail"></span>
            </div>

            <button class="account-password-btn" onclick="sendPasswordReset()">
              Change Password
            </button>

            <button class="account-logout-btn" onclick="logout()">
              Logout
            </button>
          </div>
        </div>

        <div id="chatContainer" style="display: none">
          <div id="chatHeader">
            <button class="back-btn" onclick="goBack()">←</button>
            <img
              id="chatPhoto"
              class="chat-pic"
              src="https://via.placeholder.com/40"
            />
            <span id="chatWithName"></span>
          </div>

          <div id="messages"></div>
          <div id="replyPreview" class="reply-preview" style="display: none">
            <div>
              <strong id="replyName"></strong>
              <p id="replyText"></p>
            </div>
            <button onclick="cancelReply()">×</button>
          </div>
          <div id="inputBox">
            <input id="messageInput" placeholder="Type a message" />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
